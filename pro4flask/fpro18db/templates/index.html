<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사내 인사 시스템</title>
    <style>
        /* 기본 배경 및 폰트 설정 */
        body {
            font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 메인 카드 스타일 */
        .main-card {
            background: white;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .main-card:hover {
            transform: translateY(-5px);
        }

        /* 아이콘 느낌의 그래픽 (이모지 활용) */
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }

        /* 제목 스타일 */
        h2 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        /* 버튼 및 링크 스타일 */
        .nav-button {
            display: inline-block;
            background-color: #1a73e8;
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(26, 115, 232, 0.3);
        }

        .nav-button:hover {
            background-color: #1557b0;
            box-shadow: 0 6px 20px rgba(26, 115, 232, 0.4);
            transform: scale(1.02);
        }

        .nav-button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div class="main-card">
        <span class="icon">🏢</span>
        <h2>사내 인사 관리 시스템</h2>
        <p>임직원 정보 및 직급별 연봉 통계를<br>빠르고 간편하게 확인하세요.</p>

        <a href="/dbshow" class="nav-button">데이터 조회 시작하기</a>
    </div>
</body>

</html>
