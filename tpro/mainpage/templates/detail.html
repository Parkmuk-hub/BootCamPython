<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>{{ p.name }} - 상세정보</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 50px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 50px;
            align-items: flex-start;
        }

        /* [수정] overflow: hidden 추가로 이미지가 튀어나가지 않게 함 */
        .img-large {
            width: 400px;
            aspect-ratio: 3/4;
            background: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: #ccc;
            overflow: hidden;
            border-radius: 8px;
        }

        /* 이미지 크기를 박스에 딱 맞게 강제 고정 */
        .img-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            flex: 1;
        }

        .info h2 {
            margin-top: 0;
            font-size: 28px;
        }

        .price {
            font-size: 24px;
            font-weight: bold;
            color: #ff0000;
            margin: 20px 0;
        }

        .btns {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: 1px solid #000;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            text-align: center;
            text-decoration: none;
        }

        .btn-black {
            background: #000;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="img-large">
            {% if p.img %}
            <img src="{{ p.img }}" alt="{{ p.name }}">
            {% else %}
            IMAGE
            {% endif %}
        </div>

        <div class="info">
            <p style="color:#888; margin-bottom: 5px;">{{ p.brand }}</p>
            <h2>{{ p.name }}</h2>
            <div class="price">{{ "{:,}".format(p.price) }}원</div>
            <p style="color:#666; min-height: 100px;">{{ p.desc }}</p>

            <div class="btns">
                <a href="{{ url_for('order_page', p_id=p.id) }}" class="btn btn-black">바로 구매하기</a>

                <a href="{{ url_for('add_cart', p_id=p.id) }}" class="btn" style="background:#fff; color:#000;">장바구니
                    담기</a>
            </div>

            <div style="margin-top: 50px; border-top: 1px solid #eee; padding-top: 20px;">
                <a href="/main" class="btn-back">
                    <span style="margin-right: 8px;">←</span> 메인으로
                </a>
            </div>

            <style>
                .btn-back {
                    display: inline-flex;
                    align-items: center;
                    justify-content: center;
                    padding: 12px 24px;
                    color: #888;
                    font-size: 13px;
                    font-weight: 600;
                    letter-spacing: 0.05em;
                    text-decoration: none;
                    border: 1px solid #ddd;
                    border-radius: 4px;
                    transition: all 0.3s ease;
                }

                .btn-back:hover {
                    color: #000;
                    border-color: #000;
                    background-color: #f9f9f9;
                }
            </style>
        </div>
    </div>
</body>

</html>
