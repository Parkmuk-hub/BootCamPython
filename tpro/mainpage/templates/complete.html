<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>주문 완료</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background: #000;
            /* 배경 검정 */
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .complete-box {
            text-align: center;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        p {
            color: #888;
            margin-bottom: 40px;
        }

        .home-btn {
            display: inline-block;
            padding: 15px 40px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            /* 둥근 버튼 */
            transition: 0.3s;
        }

        .home-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="complete-box">
        <div class="icon">🚀</div>
        <h2>ORDER COMPLETE</h2>
        <p>고객님의 주문이 성공적으로 접수되었습니다.</p>
        <a href="/main" class="home-btn">쇼핑 계속하기 (홈으로)</a>
    </div>
</body>

</html>
