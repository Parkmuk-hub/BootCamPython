<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>로그인 - 김밥천국</title>
    <style>
        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 350px;
            border: 1px solid #ddd;
            text-align: center;
            border-radius: 8px;
        }

        .logo {
            font-size: 30px;
            font-weight: 900;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #000;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .error {
            color: red;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .info {
            font-size: 12px;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>

<body
    style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #fff; font-family: 'Pretendard', sans-serif;">

    <div style="margin-bottom: 40px; text-align: center;">
        <a href="/main"
            style="text-decoration: none; color: #000; font-size: 32px; font-weight: 900; letter-spacing: -1px;">김밥천국</a>
    </div>

    <div style="width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 10px;">

        <form action="/login" method="POST" style="display: flex; flex-direction: column; gap: 10px; margin: 0;">
            <input type="text" name="user_id" placeholder="아이디" required
                style="width: 100%; height: 52px; padding: 0 15px; border: 1px solid #f2f2f2; border-radius: 8px; box-sizing: border-box; background: #f9f9f9; font-size: 15px;">

            <input type="password" name="user_pw" placeholder="비밀번호" required
                style="width: 100%; height: 52px; padding: 0 15px; border: 1px solid #f2f2f2; border-radius: 8px; box-sizing: border-box; background: #f9f9f9; font-size: 15px;">

            <button type="submit"
                style="width: 100%; height: 52px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 5px;">
                로그인
            </button>
        </form>

        <div style="text-align: center; font-size: 14px; font-weight: bold; margin: 20px 0 10px 0;">
            지금 가입하면, 신규 할인 쿠폰 즉시 발급
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <a href="#"
                style="text-decoration: none; display: flex; align-items: center; justify-content: center; width: 100%; height: 52px; background: #FEE500; color: #000; border-radius: 8px; font-weight: 600; font-size: 15px; position: relative;">
                <svg viewBox="0 0 24 24" width="18" height="18" style="position: absolute; left: 20px;">
                    <path
                        d="M12 3c-4.97 0-9 3.185-9 7.115 0 2.558 1.707 4.8 4.315 6.091l-1.099 4.032c-.052.193.06.393.25.464.062.024.128.034.192.034.135 0 .265-.054.356-.154l4.73-5.204c.404.032.817.047 1.256.047 4.97 0 9-3.185 9-7.115S16.97 3 12 3z"
                        fill="#3C1E1E" />
                </svg>
                카카오로 시작하기
            </a>

            <a href="#"
                style="text-decoration: none; display: flex; align-items: center; justify-content: center; width: 100%; height: 52px; background: #fff; color: #000; border: 1px solid #ddd; border-radius: 8px; font-weight: 600; font-size: 15px; position: relative;">
                <svg viewBox="0 0 24 24" width="18" height="18" style="position: absolute; left: 20px;">
                    <path
                        d="M17.05 20.28c-.96.95-2.15 1.5-3.44 1.5-1.18 0-2.06-.38-3.08-.38-1.04 0-2.13.38-3.13.38-1.4 0-2.73-.7-3.8-1.85-2.14-2.3-2.14-5.95 0-8.25 1.07-1.14 2.4-1.84 3.8-1.84 1 0 1.9.34 2.87.34.94 0 2.1-.38 3.25-.38 1.14 0 2.18.44 2.97 1.13-2.6 1.43-2.15 5.37.58 6.55-.58 1.4-1.3 2.76-2.22 3.75zM12.03 7.25c-.02-2.13 1.73-3.93 3.84-4.05.18 2.24-1.93 4.14-3.84 4.05z"
                        fill="#000" />
                </svg>
                Apple로 시작하기
            </a>

            <a href="/signup"
                style="text-decoration: none; display: flex; align-items: center; justify-content: center; width: 100%; height: 52px; background: #fff; color: #000; border: 1px solid #ddd; border-radius: 8px; font-weight: 600; font-size: 15px;">
                회원가입
            </a>
        </div>

        <div style="margin-top: 20px; display: flex; justify-content: center; gap: 15px; font-size: 13px; color: #888;">
            <a href="#" style="text-decoration: none; color: inherit;">아이디 찾기</a>
            <span>|</span>
            <a href="#" style="text-decoration: none; color: inherit;">비밀번호 찾기</a>
        </div>
    </div>
</body>


</html>
