<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>로그인 - 김밥천국</title>
    <style>
        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 350px;
            border: 1px solid #ddd;
            text-align: center;
            border-radius: 8px;
        }

        .logo {
            font-size: 30px;
            font-weight: 900;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #000;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .error {
            color: red;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .info {
            font-size: 12px;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="logo">김밥천국</div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}<div class="error">{{ messages[0] }}</div>{% endif %}
        {% endwith %}

        <form action="/login" method="post">
            <input type="text" name="uid" placeholder="아이디 (test)" required>
            <input type="password" name="upw" placeholder="비밀번호 (1234)" required>
            <button type="submit">로그인</button>
        </form>
        <div class="info">테스트 계정: test / 1234</div>
    </div>
</body>

</html>
