<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>

<body>
    ---table(표) tag---<br>
    <table border="2">
        <tr>
            <th>번호</th>
            <th>이름</th>
            <th>주소</th>
        </tr>
        <tr>
            <td width="100">1</td>
            <td>가나다</td>
            <td>강남구 역삼동</td>
        </tr>
        <tr>
            <td>2</td>
            <td></td>
            <td></td>
        </tr>
    </table>
    <br />
    열병합, 행병합<br>
    <table border="1" width="200">
        <tr>
            <td colspan="2">a</td>
            <td>b</td>
            <td rowspan="2">c</td>
        </tr>
        <tr>
            <td>d</td>
            <td>cell(셀)</td>
            <td>
                <table border="2">
                    <td>kor</td>
                    <td>eng</td>
                </table>
            </td>
        </tr>
    </table>
    <hr>
    ----- form Tag(자료 입력용 태그) -----
    <form method="get">
        1. 이름 : <input type="text" name="name" id="irum" value="집가자" size="30"> <br>
        <!--readonly 읽기만 가능-->
        2. 비밀번호 : <input type="password" name="pwd" /><br>
        3. 메세지 : <textarea name="msg" cols="50" rows="5">멀티라인 텍스트 박스</textarea><br>
        4. 학년 : <input type="radio" name="hak" value="1" checked>1학년
        <input type="radio" name="hak" value="1">2학년
        <input type="radio" name="hak" value="1">3학년
        <input type="radio" name="hak" value="1">4학년
        <br> <!--그룹은 name에 따라 다르다.-->
        5. 과목 : <input type="checkbox" name="gwa" value="python">파이썬&nbsp;&nbsp;
        <input type="checkbox" name="gwa" value="C">C언어&nbsp;&nbsp;
        <input type="checkbox" name="gwa" value="JAVA">자바&nbsp;&nbsp;
        <br>
        6. 지역 : <select name="addr"> <!--multiple-->
            <option value="c" selected>시청</option>
            <option value="j">종로</option>
            <option value="K">강남</option>
        </select>
        <br>
        7. <input type="file" name="fname"><br>
        8. 숨김 : <input type="hidden" name="ji" value="대한민국">
        <br><br>
        <input type="submit" value="전송 확인">
        <input type="reset" value="압축 취소">
    </form>


</body>

</html>
