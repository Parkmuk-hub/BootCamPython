<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    *** 반복문 for(초기값; 조건; 증감값) ***
    <br>
    <script>
        // for (let a = 1; a <= 5; a = a + 1) {
        // for (let a = 1; a <= 5; a += 1) {
        for (var a = 1; a <= 5; a++) { // ++a
            document.write("a 값은 " + a + "<br>");
        } document.write("반복문 끝/ a값 :", a, "<br>");
        document.write("<br>");

        for (let a = 5; a >= 1; a--) {
            document.write("a 값은 " + a + "<br>")
        }
        document.write("<br>");

        for (let a = 3; a < 11; a++) {
            document.write("a 값은 " + a + "<br>")
        }
        document.write("<br>*** 다중 for ***<br>");
        for (let i = 1; i <= 3; i++) {
            document.write("i값은 =>" + i + "&nbsp;&nbsp;");
            for (let j = 1; j <= 4; j++) {
                document.write("j :" + j + "&nbsp;&nbsp;");
            }
            document.write("<br>")
        }
        document.write("<br>1 ~ 10 까지의 정수 합은?<br>");
        let hap = 0;
        for (let su = 1; su <= 10; su++) {
            hap += su;
        }
        document.write(hap)
        document.write("<br>1 ~ 100 까지의 정수 중 2의 배수이나 5의 배수가 아닌 수의 합 출력?<br>");
        let total = 0;
        for (let nu = 1; nu <= 100; nu++) {
            // if (nu % 2 == 0 && nu % 5 != 0) {
            // == 는 느슨한 동등 비교로 타입을 자동 변환하여 값만 비교
            // === 는 엄격한 일치 비교로 값과 데이터 타입이 모두 같아야 true를 반환
            if (nu % 2 === 0 && nu % 5 !== 0) { //권장
                total += nu
            }
        }
        document.write(total, "<br>");

        document.write("<hr>2 ~ 9 구구단 출력 = table에 출력<br>");
        document.write("<table border='1'>");
        for (let a = 2; a < 10; a++) {
            document.write("<tr>");
            for (let i = 1; i < 10; i++) {
                //document.write("<td>");
                //document.write(a + "x" + i + "=" + a * i)
                //document.write("</td>");
                document.write(`<td>${a}*${i}=${a * i}&nbsp;&nbsp;</td>`);  // 템플릿 문자열
            }
            document.write("</tr>");
        }
        document.wrtie("</table>")
    </script>

</body>

</html>
