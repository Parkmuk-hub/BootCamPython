<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="text/javascript">
        function bb() {
            document.write(`bb 함수 실행 성공`);
            cc(5);      // 함수가 다른 함수 호출 가능 (반환 값 무시)
            //return;     // 함수 무조건 탈출(아래 문장은 수행 안함) - 자기를 부른 곳으로 복귀

            let re = cc(5);     // (반환 값 처리)
            document.write(`<br>re는 ${re}`);

            // --dd 함수 호출
            dd(7, 8)    //  정상 실행
            dd(7, 8, 9);    // 세번째 인자는 무시/ Python에서는 오류남
            dd(7);      // 7, undefined

            // js는 일급객체 지원 === Python
            // 함수가 함수 호출 가능, 매개변수로 함수 전달 가능, 반환 값 함수 가능
        }

        function cc(para) {      // 매개변수가 있는 함수
            let kk = para + 10;
            document.write(`<br>kk는 ${kk}`);
            return kk;      // 반환 값은 1개만 가능
        }

        function dd(para1, para2) {
            document.write(`<br>dd 함수에서 ${para1} ${para2}`);

        }
        // 전역, 지역 변수
        let ace = 100;  // 전역 변수
        const bace = 200;   // 전역 상수

        function func() {
            let cace = 300;    // 지역 변수
            const dace = 400;   // 지역 상수
            document.write(`<br>ace: ${ace} bace: ${bace}`);
            document.write(`<br>cace: ${cace} dace: ${dace}`);
        }
    </script>
</head>

<body>
    *** 함수(function) : 어떤 특별한 목적의 작업을 수행하도록 설계된 독립적 블록{}을 의미 ***
    <hr>
    <script>
        // 내장함수 : js가 기본 지원
        let str = "Java Script Language"
        document.write(`str.charAt(2) : ${str.charAt(2)}`);
        document.write("<br>");

        document.write(`str.bold() : ${str.bold()}`);
        document.write("<br>");

        document.write(`Math.abs(-7) : ${Math.abs(-7)}`);
        document.write("<br>");
    </script>
    <hr>
    *** 사용자 정의 함수 ***<br>
    <script>
        let count = 0;
        function aa() {      // 함수 선언
            count += 1;
            document.write(count + "번 수행<br>");
        } aa();     // 함수 실행
        document.write("딴짓하다~~~~~~~~<br>");
        aa();
        document.write("함수는 참조형 타입 :", typeof (aa));    // function 객체
    </script>
    <div>오늘은 그묘일 : 한 잔 땡겨도 좋은 날</div>
    <script>
        aa();
    </script>
    <hr size="10" color="red">
    <div><b>생각의 전환 : html 선언부에 js 코드(함수) 작성 후 함수 호출하기</b></div>
    <script>
        bb();

        document.write("<hr>*** 전역, 지역 변수 ***");
        func();
        document.write(`<br><br>ace: ${ace} bace: ${bace}`);    // 전역 변수를 쓰기 때문에 값이 나옴
        // document.write(`<br><br>cace: ${cace} dace: ${dace}`);  // 지역 변수는 함수 밖에서 사용X
        // ReferenceError : cace, dace is not defined
    </script>

</body>

</html>
